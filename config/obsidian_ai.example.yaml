vault_path: "/home/inno/문서/Obsidian Vault/Documents/Obsidian/INNO-KB"

inbox:
  codex_logs: "00_Inbox/codex_logs"
  review: "00_Inbox/_review"
  processed: "00_Inbox/_processed"

nvidia:
  base_url: "https://integrate.api.nvidia.com/v1"
  llm_model: "meta/llama-3.1-70b-instruct"
  embedding_model: "nvidia/nv-embedqa-e5-v5"
  rerank_model: ""
  timeout_seconds: 60

indexing:
  default_include_original_inbox_logs: false
  include_patterns:
    - "10_Projects/**/*.md"
    - "20_Research/**/*.md"
    - "30_Concepts/**/*.md"
    - "50_Decisions/**/*.md"
  exclude_patterns:
    - "00_Inbox/codex_logs/**/*.md"
    - "00_Inbox/_review/**/*.md"
    - "00_Inbox/_review_live_e2e/**/*.md"
    - "99_Attachments/**"
    - ".inno_rag/**"
  note_type_policy:
    codex_session_log:
      index: false
      collection: "raw_codex_logs"
    development_log:
      index: true
      collection: "project_notes"
    decision:
      index: true
      collection: "decisions"
    research:
      index: true
      collection: "research"
    concept:
      index: true
      collection: "concepts"
    unknown:
      index: true
      collection: "general"

embedding:
  batch_size: 8
  max_retries: 3
  retry_backoff_seconds: 2
  timeout_seconds: 60
  max_chunk_chars: 500
  passage_input_type: "passage"
  query_input_type: "query"

rag:
  vector_db: "chroma"
  persist_dir: ".inno_rag/chroma"
  chunk_size: 500
  chunk_overlap: 200
  top_k: 20
  rerank_top_k: 6
  index_raw_codex_logs: false
  collection_name: "inno_obsidian_vault"
  answer_format: "markdown_with_sources"
  min_evidence_score: null
  max_evidence_distance: 0.8
  require_sources: true

safety:
  dry_run: true
  require_approval_for_apply: true
  append_only: true
  redact_secrets: true

automation:
  enabled: false
  default_mode: "dry-run"
  max_files_per_run: 10
  organize_new_codex_logs: true
  apply_approved_proposals: true
  reindex_changed_notes: true
  update_daily_log: true
  update_project_dashboard: true
  allow_full_vault_index: false
  default_index_path_prefixes:
    - "10_Projects/INNO_KIS_Trading"

operation_log:
  enabled: true
  destination: "10_Projects/INNO_KIS_Trading/06_Logs/Obsidian AI Pipeline Log.md"

dashboard:
  enabled: true
  project: "INNO_KIS_Trading"
  path: "10_Projects/INNO_KIS_Trading/Project Dashboard.md"
  auto_section_start: "<!-- BEGIN_AUTO_OBSIDIAN_AI_DASHBOARD -->"
  auto_section_end: "<!-- END_AUTO_OBSIDIAN_AI_DASHBOARD -->"
